name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.3"
          cache: true
      - name: go vet
        run: go vet ./...

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.3"
          cache: true
      - name: go test -race with coverage
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...
      - name: coverage summary
        run: go tool cover -func=coverage.out | tail -20
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  build:
    name: build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.3"
          cache: true
      - name: build all binaries
        run: |
          go build ./cmd/shingan
          go build ./cmd/runner
          go build ./cmd/api
          go build ./cmd/shingan-web
          go build ./cmd/shingan-lsp
          go build ./cmd/shingan-mcp
          go build ./cmd/shingan-gen

  # LangGraph integration tests are skipped by default because they need
  # a Python environment with the `langgraph` package installed (see
  # `requirePythonLangGraph` test helper). Codex review found 6 LangGraph
  # bugs across 5 review iterations on 2026-05-04 / 05; running these
  # integration tests on CI prevents regressions of those fixes. See #10.
  test-langgraph:
    name: test-langgraph
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.3"
          cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install langgraph shim deps
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements-shim.txt
      - name: verify langgraph importable
        run: |
          python -c "import langgraph, langgraph.graph; print('langgraph imported, version =', getattr(langgraph, '__version__', 'unknown'))"
      - name: go test -race (langgraph + python_worker only)
        run: |
          go test -race -count=1 \
            ./infrastructure/parser/... \
            ./cmd/shingan/... \
            -run 'LangGraph|PythonWorker|LocateShim'
