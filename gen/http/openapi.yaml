swagger: "2.0"
info:
    title: Shingan — AI Agent Workflow Static Analyzer API
    description: Static analysis for AI agent workflows
    version: 0.1.0
host: localhost:8080
consumes:
    - application/json
    - application/xml
    - application/gob
produces:
    - application/json
    - application/xml
    - application/gob
paths:
    /analyze:
        post:
            tags:
                - analyzer
            summary: analyze analyzer
            operationId: analyzer#analyze
            parameters:
                - name: AnalyzeRequestBody
                  in: body
                  required: true
                  schema:
                    $ref: '#/definitions/AnalyzerAnalyzeRequestBody'
                    required:
                        - format
                        - content
            responses:
                "200":
                    description: OK response.
                    schema:
                        $ref: '#/definitions/AnalysisResult'
                        required:
                            - findings
                            - summary
                            - exit_code
                "400":
                    description: Bad Request response.
                    schema:
                        $ref: '#/definitions/AnalyzerAnalyzeInvalidFormatResponseBody'
                "422":
                    description: Unprocessable Entity response.
                    schema:
                        $ref: '#/definitions/AnalyzerAnalyzeParseErrorResponseBody'
            schemes:
                - http
    /healthz:
        get:
            tags:
                - analyzer
            summary: health analyzer
            operationId: analyzer#health
            responses:
                "200":
                    description: OK response.
                    schema:
                        type: string
            schemes:
                - http
definitions:
    AnalysisResult:
        title: AnalysisResult
        type: object
        properties:
            exit_code:
                type: integer
                description: 'Exit code analog: 0/1/2'
                example: 4226525070651574214
                format: int64
            findings:
                type: array
                items:
                    $ref: '#/definitions/Finding'
                description: Detected issues
                example:
                    - message: Esse aut doloribus.
                      node_id: Veritatis neque ea quidem aut qui.
                      rule: Voluptatem deleniti dolores rerum.
                      severity: critical
                      suggestion: Rem perspiciatis.
                    - message: Esse aut doloribus.
                      node_id: Veritatis neque ea quidem aut qui.
                      rule: Voluptatem deleniti dolores rerum.
                      severity: critical
                      suggestion: Rem perspiciatis.
                    - message: Esse aut doloribus.
                      node_id: Veritatis neque ea quidem aut qui.
                      rule: Voluptatem deleniti dolores rerum.
                      severity: critical
                      suggestion: Rem perspiciatis.
            summary:
                $ref: '#/definitions/Summary'
        example:
            exit_code: 4938334916980329038
            findings:
                - message: Esse aut doloribus.
                  node_id: Veritatis neque ea quidem aut qui.
                  rule: Voluptatem deleniti dolores rerum.
                  severity: critical
                  suggestion: Rem perspiciatis.
                - message: Esse aut doloribus.
                  node_id: Veritatis neque ea quidem aut qui.
                  rule: Voluptatem deleniti dolores rerum.
                  severity: critical
                  suggestion: Rem perspiciatis.
                - message: Esse aut doloribus.
                  node_id: Veritatis neque ea quidem aut qui.
                  rule: Voluptatem deleniti dolores rerum.
                  severity: critical
                  suggestion: Rem perspiciatis.
            summary:
                critical: 9019864383028453855
                info: 7638366186936058184
                total: 7539941759466190338
                warning: 1596166169809979685
        required:
            - findings
            - summary
            - exit_code
    AnalyzerAnalyzeInvalidFormatResponseBody:
        title: 'Mediatype identifier: application/vnd.goa.error; view=default'
        type: object
        properties:
            fault:
                type: boolean
                description: Is the error a server-side fault?
                example: false
            id:
                type: string
                description: ID is a unique identifier for this particular occurrence of the problem.
                example: 123abc
            message:
                type: string
                description: Message is a human-readable explanation specific to this occurrence of the problem.
                example: parameter 'p' must be an integer
            name:
                type: string
                description: Name is the name of this class of errors.
                example: bad_request
            temporary:
                type: boolean
                description: Is the error temporary?
                example: true
            timeout:
                type: boolean
                description: Is the error a timeout?
                example: true
        description: analyze_invalid_format_response_body result type (default view)
        example:
            fault: false
            id: 123abc
            message: parameter 'p' must be an integer
            name: bad_request
            temporary: true
            timeout: false
        required:
            - name
            - id
            - message
            - temporary
            - timeout
            - fault
    AnalyzerAnalyzeParseErrorResponseBody:
        title: 'Mediatype identifier: application/vnd.goa.error; view=default'
        type: object
        properties:
            fault:
                type: boolean
                description: Is the error a server-side fault?
                example: false
            id:
                type: string
                description: ID is a unique identifier for this particular occurrence of the problem.
                example: 123abc
            message:
                type: string
                description: Message is a human-readable explanation specific to this occurrence of the problem.
                example: parameter 'p' must be an integer
            name:
                type: string
                description: Name is the name of this class of errors.
                example: bad_request
            temporary:
                type: boolean
                description: Is the error temporary?
                example: false
            timeout:
                type: boolean
                description: Is the error a timeout?
                example: true
        description: analyze_parse_error_response_body result type (default view)
        example:
            fault: false
            id: 123abc
            message: parameter 'p' must be an integer
            name: bad_request
            temporary: false
            timeout: false
        required:
            - name
            - id
            - message
            - temporary
            - timeout
            - fault
    AnalyzerAnalyzeRequestBody:
        title: AnalyzerAnalyzeRequestBody
        type: object
        properties:
            content:
                type: string
                description: Raw workflow definition content
                example:
                    - 86
                    - 101
                    - 108
                    - 105
                    - 116
                    - 32
                    - 102
                    - 117
                    - 103
                    - 97
                    - 46
                format: byte
            format:
                type: string
                description: 'Input format: json or adk-go'
                example: json
                enum:
                    - json
                    - adk-go
            output:
                type: string
                description: 'Output format: json or markdown'
                default: json
                example: json
                enum:
                    - json
                    - markdown
        example:
            content:
                - 73
                - 110
                - 32
                - 110
                - 101
                - 115
                - 99
                - 105
                - 117
                - 110
                - 116
                - 32
                - 99
                - 111
                - 110
                - 115
                - 101
                - 113
                - 117
                - 97
                - 116
                - 117
                - 114
                - 46
            format: json
            output: json
        required:
            - format
            - content
    Finding:
        title: Finding
        type: object
        properties:
            message:
                type: string
                example: Porro atque eum sapiente tempore sint non.
            node_id:
                type: string
                example: Optio sunt odio harum consequatur quod suscipit.
            rule:
                type: string
                example: Iure ut.
            severity:
                type: string
                example: critical
                enum:
                    - critical
                    - warning
                    - info
            suggestion:
                type: string
                example: Voluptas voluptatem.
        example:
            message: Perferendis accusantium quia enim qui quis officiis.
            node_id: Omnis autem sunt cumque soluta quasi voluptatem.
            rule: Doloremque sed dolorum ipsam laborum mollitia.
            severity: critical
            suggestion: Praesentium quia ut.
        required:
            - rule
            - severity
            - node_id
            - message
    Summary:
        title: Summary
        type: object
        properties:
            critical:
                type: integer
                example: 593285578381147398
                format: int64
            info:
                type: integer
                example: 1866941839767615479
                format: int64
            total:
                type: integer
                example: 8542048562740120476
                format: int64
            warning:
                type: integer
                example: 2681793108443158924
                format: int64
        example:
            critical: 7287131881739858907
            info: 5041635441967398829
            total: 6112985088951658194
            warning: 1891795780149181375
        required:
            - total
            - critical
            - warning
            - info
